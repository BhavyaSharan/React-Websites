<script data-purpose="particle-simulation">
    /**
     * Simulation logic for floating particles and glow effects 
     * acting as the "transformation" visual.
     */
    const canvas = document.getElementById('experience-canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let width, height;

    function init() {
      resize();
      for (let i = 0; i < 150; i++) {
        particles.push(new Particle());
      }
      animate();
    }

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 1.5;
        this.color = Math.random() > 0.5 ? '#51c878' : '#D4AF37';
        this.alpha = Math.random();
      }

      update() {
        this.y -= this.speedY;
        this.x += this.speedX;
        
        if (this.y < 0) {
          this.y = height;
          this.x = Math.random() * width;
        }
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      // Drawing a subtle "Humanoid" glow in the center-right
      const centerX = width * 0.7;
      const centerY = height * 0.5;
      
      const gradient = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 300);
      gradient.addColorStop(0, 'rgba(81, 200, 120, 0.15)');
      gradient.addColorStop(0.5, 'rgba(212, 175, 55, 0.05)');
      gradient.addColorStop(1, 'transparent');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    init();
  </script>
<!-- END: Interactive Logic -->
